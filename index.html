<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logoimage.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PhysioWorld - Expert Physiotherapy Care for a Pain-Free Life. Professional physiotherapy treatments with modern equipment and personalized care." />
    <meta name="keywords" content="physiotherapy, pain relief, knee pain, back pain, sports rehabilitation, physiotherapist" />
    <meta name="author" content="PhysioWorld" />
    <meta name="theme-color" content="#0a2540" />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="PhysioWorld - Expert Physiotherapy Care" />
    <meta property="og:description" content="Get back to pain-free living with India's most trusted physiotherapy clinic. Book your free consultation today!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://physioworld.com" />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts - Inter & Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome CDN (fallback) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <title>PhysioWorld | Expert Physiotherapy & Rehabilitation Center</title>
    
    <style>
      /* Critical CSS for initial render */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', 'Poppins', sans-serif;
        overflow-x: hidden;
        background-color: #ffffff;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #14b8a6;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #0d9488;
      }
      
      /* Loading spinner */
      .loading-spinner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #ffffff 0%, #f0fdfa 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      
      .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid #e2e8f0;
        border-top-color: #14b8a6;
        border-right-color: #0d9488;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      
      /* Fade in animation */
      .fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading spinner that will be removed when React mounts -->
    <div id="loading-spinner" class="loading-spinner">
      <div class="spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Remove loading spinner when React app is ready
      window.addEventListener('load', function() {
        const spinner = document.getElementById('loading-spinner');
        if (spinner) {
          setTimeout(() => {
            spinner.style.opacity = '0';
            setTimeout(() => {
              spinner.remove();
            }, 300);
          }, 500);
        }
      });
    </script>
  </body>
</html>
